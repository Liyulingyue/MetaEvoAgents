[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = [
    "E",    # pycodestyle errors
    "W",    # pycodestyle warnings
    "F",    # pyflakes
    "I",    # isort
    "UP",   # pyupgrade
    "B",    # flake8-bugbear
    "C4",   # flake8-comprehensions
    "PLC0415",  # import should be at top-level (函数内 import 需标注 noqa)
]
ignore = [
    "E501",  # line too long (handled by formatter)
    "I001",  # import block is un-sorted or un-formatted (函数内 import 是延迟加载的合理模式)
]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
